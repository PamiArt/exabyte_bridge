<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIEAI Experimental Data Systems</title>

<style>

body{
background:#0f172a;
font-family:Arial, Helvetica, sans-serif;
color:white;
margin:0;
overflow:hidden;
}

.header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
letter-spacing:1px;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-top:-10px;
margin-bottom:30px;
}

.container{
position:relative;
width:100%;
height:80vh;
display:flex;
align-items:center;
justify-content:center;
}

.core{
position:absolute;
width:220px;
height:220px;
background:#1e293b;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-weight:bold;
font-size:18px;
box-shadow:0 0 25px #38bdf8;
}

.system{
position:absolute;
width:170px;
height:70px;
background:#1e293b;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
box-shadow:0 0 12px rgba(56,189,248,0.6);
}

.utilities{
position:absolute;
width:170px;
height:60px;
background:#020617;
border:1px solid #334155;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
color:#94a3b8;
}

/* SYSTEM POSITIONS */

.s1{top:80px;left:8%;}
.s2{top:80px;left:28%;}
.s3{top:80px;right:28%;}
.s4{top:80px;right:8%;}

.u1{bottom:60px;left:15%;}
.u2{bottom:60px;left:35%;}
.u3{bottom:60px;right:35%;}
.u4{bottom:60px;right:15%;}

svg{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

line{
stroke:#38bdf8;
stroke-width:2;
opacity:0.5;
}

</style>
</head>


<body>

<div class="header">
MIEAI.MY
</div>

<div class="subtitle">
Experimental Data Systems
</div>

<div class="container">

<div class="core">
CORE SYSTEM
</div>

<div class="system s1">Data Ingestion</div>
<div class="system s2">Analytics Engine</div>
<div class="system s3">Model Builder</div>
<div class="system s4">Visualization</div>

<div class="utilities u1">API Gateway</div>
<div class="utilities u2">Automation</div>
<div class="utilities u3">Data Storage</div>
<div class="utilities u4">Security Layer</div>

<svg>

<!-- Core to Systems -->

<line x1="50%" y1="50%" x2="10%" y2="20%"/>
<line x1="50%" y1="50%" x2="30%" y2="20%"/>
<line x1="50%" y1="50%" x2="70%" y2="20%"/>
<line x1="50%" y1="50%" x2="90%" y2="20%"/>

<!-- Core to Utilities -->

<line x1="50%" y1="50%" x2="20%" y2="85%"/>
<line x1="50%" y1="50%" x2="40%" y2="85%"/>
<line x1="50%" y1="50%" x2="60%" y2="85%"/>
<line x1="50%" y1="50%" x2="80%" y2="85%"/>

</svg>

</div>

</body>
</html>
