<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIEAI | The Future is Loading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700&family=Space+Grotesk:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        /* Convert logo to pure white */
        .logo-white {
            filter: brightness(0) invert(1);
            max-width: 320px;
            height: auto;
            transition: transform 0.5s ease;
        }
        
        .logo-white:hover {
            transform: scale(1.02);
        }

        .fade-up {
            animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shimmer-text {
            background: linear-gradient(90deg, #ffffff 0%, #444444 50%, #ffffff 100%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            text-fill-color: transparent;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #ffffff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <!-- Subtle Background Glow -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-white/5 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] bg-white/5 rounded-full blur-[120px]"></div>
    </div>

    <main class="relative z-10 text-center max-w-3xl">
        <!-- Status Indicator -->
        <div class="mb-8 fade-up" style="animation-delay: 0.1s">
            <span class="inline-flex items-center px-4 py-1 rounded-full border border-white/20 text-[10px] tracking-[0.2em] uppercase text-gray-400">
                <span class="status-dot"></span> System Finalizing
            </span>
        </div>

        <!-- Logo Container -->
        <div class="mb-14 flex justify-center fade-up" style="animation-delay: 0.3s">
            <img src="523340.jpg" alt="MIEAI" class="logo-white">
        </div>

        <!-- Main Teaser -->
        <div class="fade-up" style="animation-delay: 0.5s">
            <h1 class="text-5xl md:text-7xl font-bold mb-8 tracking-tighter leading-tight">
                Something bigger <br> 
                <span class="shimmer-text">will launch to you.</span>
            </h1>

            <p class="text-gray-500 text-lg md:text-xl mb-12 max-w-xl mx-auto font-light">
                Redefining the boundaries of intelligence. <br class="hidden md:block">
                Be the first to experience the next generation AI system.
            </p>
        </div>

        <!-- Early Access CTA -->
        <div class="max-w-md mx-auto fade-up" style="animation-delay: 0.7s">
            <div class="flex flex-col sm:flex-row gap-3 p-1 rounded-xl glass-input">
                <input type="email" placeholder="Enter your email address" 
                    class="flex-1 bg-transparent px-5 py-4 text-white focus:outline-none transition-all placeholder:text-gray-600">
                <button class="bg-white text-black font-semibold px-8 py-4 rounded-lg hover:bg-gray-200 transition-all active:scale-95 text-sm">
                    Get Early Access
                </button>
            </div>
            <p class="text-[10px] text-gray-600 mt-6 uppercase tracking-[0.3em]">Stay tuned for the unveiling</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="absolute bottom-10 left-0 w-full text-center fade-up" style="animation-delay: 0.9s">
        <p class="text-gray-700 text-xs tracking-widest font-light">&copy; 2024 MIEAI &mdash; PRECISION INTELLIGENCE</p>
    </footer>

    <script>
        // Simple Interaction
        const button = document.querySelector('button');
        const input = document.querySelector('input');

        button.addEventListener('click', () => {
            if (input.value.includes('@')) {
                button.innerText = 'Invited';
                button.classList.remove('bg-white');
                button.classList.add('bg-gray-800', 'text-white');
                input.value = '';
                input.placeholder = 'We will reach out soon.';
            } else {
                input.classList.add('border-red-500');
                setTimeout(() => input.classList.remove('border-red-500'), 2000);
            }
        });
    </script>
</body>
</html>
